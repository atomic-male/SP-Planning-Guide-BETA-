<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SP Planning-Recruitment Guide</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        input { width: 100%; border: none; padding: 5px; box-sizing: border-box; }
        .total-row { font-weight: bold; background-color: #e9ecef; }
        .btn-container { margin-top: 15px; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>SP Planning-Recruitment Guide</h2>

    <table id="spTable">
        <thead>
            <tr>
                <th>EVENT ID NO.</th>
                <th>DATE</th>
                <th>RECRUITED SP NAME</th>
                <th>DEPT</th>
                <th>EVENT TYPE</th>
                <th>ROLE</th>
                <th>EVENT HOURS</th>
                <th>SCHEDULED HOURS</th>
                <th>ESTIMATED COST</th>
                <th>ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            <tr class="data-row">
                <td><input type="text"></td>
                <td><input type="date"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="number" class="event-hrs" value="0"></td>
                <td><input type="number" class="sched-hrs" value="0" oninput="calculateRow(this)"></td>
                <td class="row-cost">$0.00</td>
                <td>
                    <button onclick="copyRow(this)">Copy</button>
                    <button onclick="deleteRow(this)">Delete</button>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="7">TOTALS</td>
                <td id="grand-total-hours">0</td>
                <td id="grand-total-cost">$0.00</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

    <div class="btn-container">
        <button onclick="addRow()">Add New Row</button>
    </div>

    <script>
        function calculateRow(input) {
            const row = input.closest('tr');
            const schedHours = parseFloat(input.value) || 0;
            const cost = schedHours * 25;
            row.querySelector('.row-cost').innerText = '$' + cost.toFixed(2);
            updateGrandTotals();
        }

        function updateGrandTotals() {
            let totalHours = 0;
            let totalCost = 0;
            document.querySelectorAll('.sched-hrs').forEach(input => {
                const val = parseFloat(input.value) || 0;
                totalHours += val;
                totalCost += (val * 25);
            });
            document.getElementById('grand-total-hours').innerText = totalHours;
            document.getElementById('grand-total-cost').innerText = '$' + totalCost.toFixed(2);
        }

        function addRow() {
            const tbody = document.getElementById("spTable").getElementsByTagName('tbody')[0];
            const newRow = tbody.insertRow();
            newRow.className = "data-row";
            newRow.innerHTML = tbody.rows[0].innerHTML; // Simplistic copy of structure
        }

        function copyRow(btn) {
            const row = btn.closest('tr');
            const newRow = row.cloneNode(true);
            row.parentNode.insertBefore(newRow, row.nextSibling);
            updateGrandTotals();
        }

        function deleteRow(btn) {
            const row = btn.closest('tr');
            if (document.querySelectorAll('.data-row').length > 1) {
                row.remove();
                updateGrandTotals();
            } else {
                alert("You must have at least one row.");
            }
        }
    </script>
</body>
</html>
